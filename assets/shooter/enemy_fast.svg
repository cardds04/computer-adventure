<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="efBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9dffce"/>
      <stop offset="0.5" stop-color="#28d97a"/>
      <stop offset="1" stop-color="#0f9a52"/>
    </linearGradient>
    <radialGradient id="efGlass" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#b6ffe6"/>
      <stop offset="1" stop-color="#15c071"/>
    </radialGradient>
  </defs>
  <!-- swept wings -->
  <path d="M50 40 L14 26 L20 44 L46 56 Z" fill="#0f9a52" stroke="#08562f" stroke-width="3" stroke-linejoin="round"/>
  <path d="M50 40 L86 26 L80 44 L54 56 Z" fill="#0f9a52" stroke="#08562f" stroke-width="3" stroke-linejoin="round"/>
  <!-- sleek dart body pointing DOWN -->
  <path d="M50 92 C42 74 38 48 42 24 C44 14 47 8 50 6 C53 8 56 14 58 24 C62 48 58 74 50 92 Z"
        fill="url(#efBody)" stroke="#08562f" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- cockpit -->
  <ellipse cx="50" cy="34" rx="8" ry="11" fill="url(#efGlass)" stroke="#08562f" stroke-width="2.5"/>
  <!-- nose highlight -->
  <path d="M50 86 q-3 -16 -3 -34" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
