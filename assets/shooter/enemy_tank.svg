<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="etBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9a8b"/>
      <stop offset="0.5" stop-color="#e83b3b"/>
      <stop offset="1" stop-color="#a01616"/>
    </linearGradient>
    <linearGradient id="etArmor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd0c4"/>
      <stop offset="1" stop-color="#c23030"/>
    </linearGradient>
    <radialGradient id="etCore" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fff6a0"/>
      <stop offset="0.6" stop-color="#ffb300"/>
      <stop offset="1" stop-color="#e65100"/>
    </radialGradient>
  </defs>
  <!-- side cannons -->
  <rect x="6" y="40" width="16" height="30" rx="5" fill="url(#etArmor)" stroke="#5e0d0d" stroke-width="3"/>
  <rect x="78" y="40" width="16" height="30" rx="5" fill="url(#etArmor)" stroke="#5e0d0d" stroke-width="3"/>
  <!-- heavy hull -->
  <path d="M50 10 C30 10 20 26 20 48 C20 70 32 86 50 86 C68 86 80 70 80 48 C80 26 70 10 50 10 Z"
        fill="url(#etBody)" stroke="#5e0d0d" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- armor plates -->
  <path d="M28 36 H72" stroke="#5e0d0d" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M26 60 H74" stroke="#5e0d0d" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <rect x="34" y="20" width="32" height="12" rx="4" fill="#ffd0c4" opacity="0.55"/>
  <!-- glowing core eye -->
  <circle cx="50" cy="50" r="13" fill="url(#etCore)" stroke="#5e0d0d" stroke-width="3"/>
  <circle cx="50" cy="50" r="5" fill="#5e0d0d"/>
  <!-- rivets -->
  <g fill="#5e0d0d">
    <circle cx="28" cy="26" r="2.5"/><circle cx="72" cy="26" r="2.5"/>
    <circle cx="26" cy="72" r="2.5"/><circle cx="74" cy="72" r="2.5"/>
  </g>
</svg>
