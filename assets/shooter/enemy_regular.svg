<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="erBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c98bff"/>
      <stop offset="0.5" stop-color="#9b46f0"/>
      <stop offset="1" stop-color="#6a1fb8"/>
    </linearGradient>
    <radialGradient id="erEye" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#7ef9c0"/>
      <stop offset="1" stop-color="#13b87a"/>
    </radialGradient>
  </defs>
  <!-- tentacle feet -->
  <g fill="url(#erBody)" stroke="#3d0f78" stroke-width="3" stroke-linejoin="round">
    <path d="M22 64 q-4 16 4 18 q6 -6 8 -16 Z"/>
    <path d="M44 70 q-2 16 4 18 q6 -4 6 -18 Z"/>
    <path d="M70 64 q8 14 4 18 q-8 -2 -12 -14 Z"/>
  </g>
  <!-- head/body -->
  <path d="M50 12 C28 12 18 30 18 48 C18 62 30 72 50 72 C70 72 82 62 82 48 C82 30 72 12 50 12 Z"
        fill="url(#erBody)" stroke="#3d0f78" stroke-width="4" stroke-linejoin="round"/>
  <!-- antennae -->
  <path d="M36 14 q-4 -10 -10 -12" fill="none" stroke="#3d0f78" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="25" cy="2.5" r="4" fill="#ff5fa2" stroke="#3d0f78" stroke-width="2"/>
  <path d="M64 14 q4 -10 10 -12" fill="none" stroke="#3d0f78" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="75" cy="2.5" r="4" fill="#ff5fa2" stroke="#3d0f78" stroke-width="2"/>
  <!-- eyes -->
  <ellipse cx="38" cy="44" rx="9" ry="11" fill="url(#erEye)" stroke="#3d0f78" stroke-width="2.5"/>
  <ellipse cx="62" cy="44" rx="9" ry="11" fill="url(#erEye)" stroke="#3d0f78" stroke-width="2.5"/>
  <circle cx="39" cy="46" r="3.5" fill="#1c0b3a"/>
  <circle cx="63" cy="46" r="3.5" fill="#1c0b3a"/>
  <!-- mouth -->
  <path d="M40 60 q10 8 20 0" fill="none" stroke="#3d0f78" stroke-width="3" stroke-linecap="round"/>
</svg>
