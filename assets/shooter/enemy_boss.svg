<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bsBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a6bff"/>
      <stop offset="0.45" stop-color="#5a2bc8"/>
      <stop offset="1" stop-color="#2e0d6e"/>
    </linearGradient>
    <linearGradient id="bsWing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b05bff"/>
      <stop offset="1" stop-color="#4a149c"/>
    </linearGradient>
    <radialGradient id="bsCore" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#ff4d6d"/>
      <stop offset="1" stop-color="#9b1030"/>
    </radialGradient>
  </defs>
  <!-- big swept wings -->
  <path d="M30 40 L2 48 L6 70 L34 64 Z" fill="url(#bsWing)" stroke="#1c0750" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M70 40 L98 48 L94 70 L66 64 Z" fill="url(#bsWing)" stroke="#1c0750" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- wing cannons -->
  <rect x="10" y="68" width="9" height="20" rx="3" fill="#3a1180" stroke="#1c0750" stroke-width="2.5"/>
  <rect x="81" y="68" width="9" height="20" rx="3" fill="#3a1180" stroke="#1c0750" stroke-width="2.5"/>
  <!-- main hull -->
  <path d="M50 6 C34 12 26 28 26 50 C26 72 36 90 50 94 C64 90 74 72 74 50 C74 28 66 12 50 6 Z"
        fill="url(#bsBody)" stroke="#1c0750" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- horns -->
  <path d="M40 12 q-8 -8 -6 -12 q6 2 10 8 Z" fill="#3a1180" stroke="#1c0750" stroke-width="2.5"/>
  <path d="M60 12 q8 -8 6 -12 q-6 2 -10 8 Z" fill="#3a1180" stroke="#1c0750" stroke-width="2.5"/>
  <!-- armor lines -->
  <path d="M34 40 H66 M32 64 H68" stroke="#1c0750" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <!-- evil core eye -->
  <ellipse cx="50" cy="50" rx="16" ry="18" fill="url(#bsCore)" stroke="#1c0750" stroke-width="3.5"/>
  <ellipse cx="50" cy="50" rx="5" ry="9" fill="#1c0750"/>
  <!-- side eyes -->
  <circle cx="38" cy="30" r="4" fill="#ff4d6d" stroke="#1c0750" stroke-width="2"/>
  <circle cx="62" cy="30" r="4" fill="#ff4d6d" stroke="#1c0750" stroke-width="2"/>
</svg>
