<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="mScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fe3ff"/><stop offset="1" stop-color="#2196f3"/>
    </linearGradient>
    <linearGradient id="mFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa4c8"/><stop offset="1" stop-color="#5b6488"/>
    </linearGradient>
  </defs>
  <!-- stand -->
  <rect x="42" y="72" width="16" height="12" fill="url(#mFrame)" stroke="#2d2a52" stroke-width="3"/>
  <rect x="30" y="82" width="40" height="8" rx="4" fill="url(#mFrame)" stroke="#2d2a52" stroke-width="3"/>
  <!-- monitor frame -->
  <rect x="10" y="14" width="80" height="60" rx="9" fill="url(#mFrame)" stroke="#2d2a52" stroke-width="3.5"/>
  <!-- screen -->
  <rect x="18" y="22" width="64" height="44" rx="5" fill="url(#mScreen)" stroke="#2d2a52" stroke-width="2.5"/>
  <!-- screen content: smiley -->
  <circle cx="38" cy="40" r="4" fill="#fff"/><circle cx="62" cy="40" r="4" fill="#fff"/>
  <path d="M38 52 q12 9 24 0" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <!-- glare -->
  <path d="M24 28 L40 28 L24 50 Z" fill="#ffffff" opacity="0.25"/>
</svg>
