<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="spBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a4a8c"/><stop offset="1" stop-color="#2e2456"/>
    </linearGradient>
    <radialGradient id="spCone" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd23f"/><stop offset="1" stop-color="#e8740c"/>
    </radialGradient>
  </defs>
  <!-- box -->
  <rect x="26" y="10" width="48" height="80" rx="9" fill="url(#spBox)" stroke="#1c163a" stroke-width="3.5"/>
  <!-- tweeter -->
  <circle cx="50" cy="28" r="8" fill="#8a7fc0" stroke="#1c163a" stroke-width="2.5"/>
  <circle cx="50" cy="28" r="3" fill="#1c163a"/>
  <!-- woofer -->
  <circle cx="50" cy="62" r="17" fill="#3a2f66" stroke="#1c163a" stroke-width="2.5"/>
  <circle cx="50" cy="62" r="11" fill="url(#spCone)" stroke="#1c163a" stroke-width="2.5"/>
  <circle cx="50" cy="62" r="4" fill="#1c163a"/>
  <!-- sound waves -->
  <g fill="none" stroke="#ffd23f" stroke-width="3" stroke-linecap="round">
    <path d="M80 44 q8 8 0 20" opacity="0.9"/>
    <path d="M86 38 q14 16 0 36" opacity="0.6"/>
