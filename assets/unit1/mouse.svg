<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="msBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.5" stop-color="#cdd6ef"/><stop offset="1" stop-color="#8b95bd"/>
    </linearGradient>
    <linearGradient id="msWheel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fe3ff"/><stop offset="1" stop-color="#2196f3"/>
    </linearGradient>
  </defs>
  <!-- cable -->
  <path d="M50 12 q-14 -6 -14 -10" fill="none" stroke="#2d2a52" stroke-width="3.5" stroke-linecap="round"/>
  <!-- body -->
  <path d="M50 12 C32 12 24 30 24 52 C24 74 36 90 50 90 C64 90 76 74 76 52 C76 30 68 12 50 12 Z"
        fill="url(#msBody)" stroke="#2d2a52" stroke-width="3.5"/>
  <!-- split line -->
  <path d="M50 14 V44" stroke="#2d2a52" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M26 44 H74" stroke="#2d2a52" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- scroll wheel -->
  <rect x="46" y="22" width="8" height="16" rx="4" fill="url(#msWheel)" stroke="#2d2a52" stroke-width="2.5"/>
  <!-- highlight -->
  <ellipse cx="38" cy="34" rx="5" ry="10" fill="#ffffff" opacity="0.55"/>
</svg>
