<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴퓨터 어드벤처 🚀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
    <!-- 레트로 픽셀 폰트 (5단원 타자 어드벤처) -->
    <link href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>
    <!-- 배경 풍경 (모든 화면 공통) -->
    <div id="scene" aria-hidden="true">
        <div class="scene__sun"></div>

        <div class="scene__clouds">
            <svg class="cloud cloud--1" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="50" cy="50" rx="40" ry="28" fill="white"/>
                <ellipse cx="90" cy="40" rx="48" ry="35" fill="white"/>
                <ellipse cx="140" cy="50" rx="42" ry="30" fill="white"/>
                <ellipse cx="170" cy="55" rx="28" ry="22" fill="white"/>
            </svg>
            <svg class="cloud cloud--2" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="50" cy="50" rx="40" ry="28" fill="white"/>
                <ellipse cx="90" cy="40" rx="48" ry="35" fill="white"/>
                <ellipse cx="140" cy="50" rx="42" ry="30" fill="white"/>
            </svg>
            <svg class="cloud cloud--3" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="50" cy="50" rx="36" ry="24" fill="white"/>
                <ellipse cx="100" cy="40" rx="44" ry="32" fill="white"/>
                <ellipse cx="150" cy="48" rx="38" ry="28" fill="white"/>
            </svg>
        </div>

        <!-- 먼 산 -->
        <svg class="scene__hills scene__hills--far" viewBox="0 0 1200 300" preserveAspectRatio="none">
            <path d="M0,300 L0,180 Q100,80 220,140 Q340,200 460,120 Q580,40 720,130 Q840,220 980,140 Q1080,80 1200,160 L1200,300 Z" fill="#a8c8d8"/>
        </svg>

        <!-- 가까운 언덕 -->
        <svg class="scene__hills scene__hills--mid" viewBox="0 0 1200 300" preserveAspectRatio="none">
            <path d="M0,300 L0,220 Q150,140 320,200 Q500,260 680,180 Q860,100 1040,200 Q1140,240 1200,220 L1200,300 Z" fill="#9fcfa3"/>
        </svg>

        <!-- 나무 줄 -->
        <div class="scene__trees">
            <svg class="tree tree--pine" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="30,5 10,40 20,40 5,75 25,75 15,95 45,95 35,75 55,75 40,40 50,40" fill="#5da37a"/>
                <rect x="26" y="90" width="8" height="14" fill="#7a5c3a"/>
            </svg>
            <svg class="tree tree--round" viewBox="0 0 70 90" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="35" cy="40" rx="30" ry="32" fill="#7cc395"/>
                <ellipse cx="20" cy="45" rx="14" ry="16" fill="#67b083"/>
                <ellipse cx="50" cy="48" rx="13" ry="15" fill="#67b083"/>
                <rect x="30" y="68" width="10" height="20" fill="#7a5c3a"/>
            </svg>
            <svg class="tree tree--pine tree--small" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="30,5 10,40 20,40 5,75 25,75 15,95 45,95 35,75 55,75 40,40 50,40" fill="#6cb087"/>
                <rect x="26" y="90" width="8" height="14" fill="#7a5c3a"/>
            </svg>
            <svg class="tree tree--round" viewBox="0 0 70 90" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="35" cy="40" rx="30" ry="32" fill="#7cc395"/>
                <ellipse cx="20" cy="45" rx="14" ry="16" fill="#67b083"/>
                <ellipse cx="50" cy="48" rx="13" ry="15" fill="#67b083"/>
                <rect x="30" y="68" width="10" height="20" fill="#7a5c3a"/>
            </svg>
            <svg class="tree tree--pine" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="30,5 10,40 20,40 5,75 25,75 15,95 45,95 35,75 55,75 40,40 50,40" fill="#5da37a"/>
                <rect x="26" y="90" width="8" height="14" fill="#7a5c3a"/>
            </svg>
        </div>

        <!-- 바닥 잔디 -->
        <div class="scene__ground"></div>

        <!-- 떠다니는 작은 장식들 -->
        <div class="scene__floaters">
            <span class="floater f1">🌸</span>
            <span class="floater f2">🍃</span>
            <span class="floater f3">⭐</span>
            <span class="floater f4">🌟</span>
            <span class="floater f5">🦋</span>
        </div>
    </div>

    <div id="app">
        <!-- 화면들이 동적으로 렌더링됨 -->
    </div>

    <!-- 공통 사운드/효과를 위한 컨테이너 -->
    <div id="fx-layer"></div>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/config.js"></script>
    <script src="js/data.js?v=9"></script>
    <script src="js/state.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/screens/grade_select.js"></script>
    <script src="js/screens/home.js?v=5"></script>
    <script src="js/screens/game1.js"></script>
    <script src="js/screens/game2.js"></script>
    <script src="js/screens/game3.js"></script>
    <script src="js/screens/game4.js"></script>
    <script src="js/screens/game5.js"></script>
    <script src="js/screens/game_maze.js"></script>
    <script src="js/screens/game_jump.js"></script>
    <script src="js/screens/game_archery.js"></script>
    <script src="js/screens/game_delete.js"></script>
    <script src="js/screens/game_hangul.js"></script>
    <script src="js/screens/game_type.js"></script>
    <script src="js/screens/unit3_common.js"></script>
    <script src="js/screens/game_rename.js"></script>
    <script src="js/screens/game_copy.js"></script>
    <script src="js/screens/game_delete_undo.js"></script>
    <script src="js/screens/game_select_all.js"></script>
    <script src="js/screens/game_sort.js"></script>
    <script src="js/screens/game_bbq.js"></script>
    <script src="js/screens/game_internet.js"></script>
    <script src="js/screens/game_url.js"></script>
    <script src="js/screens/game_search.js"></script>
    <script src="js/screens/game_sentence.js"></script>
    <script src="js/screens/game_quiz.js"></script>
    <script src="js/screens/game_bomber.js"></script>
    <script src="js/screens/game_ai_art.js"></script>
    <script src="js/screens/game_shooter.js"></script>
    <script src="js/screens/game_typing_adventure.js?v=5"></script>
    <script src="js/screens/game_escape.js?v=1"></script>
    <script src="js/screens/results.js"></script>
    <script src="js/screens/graduation.js"></script>
    <script src="js/screens/hall.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
